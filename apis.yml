aid: trueblue
name: TrueBlue
description: >-
  TrueBlue (NYSE: TBI) is a leading provider of workforce solutions and
  specialized talent services. TrueBlue connects people and work through
  three operating segments: PeopleReady (industrial staffing), PeopleScout
  (RPO and talent advisory), and Staff Management | SMX (managed staffing).
  TrueBlue's digital platforms include JobStack for on-demand industrial
  staffing and Affinix for recruitment process outsourcing.
